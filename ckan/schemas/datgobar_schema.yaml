dataset_type: dataset
about: Esquema de metadatos basado en DCAT-AP de datos.gob.ar
about_url: https://datosgobar.github.io/paquete-apertura-datos/perfil-metadatos/


dataset_fields:

  #IDENTIFIER
- field_name: dataset_identifier
  display_property: dct:identifier
  label: Dataset Identifier
  form_placeholder: 123e4567-e89b-12d3-a456-426614174000
  help_text:
    en: Dataset id (UUID)
    es: Identificador único del dataset, este identificador debe ser único para todo el catálogo.
  help_inline: true
  required: true

#TITLE
#Acá habría que agregar un validador que garantice extensión
- field_name: dataset_title
  display_property: dct:title
  label: Dataset Title
  form_placeholder: eg. Esquema AIF. Devengado
  preset: title
  help_text:
    en: >
      Title under which the dataset will be published.
      It should be clear and abstract enough to cover all distributions.
      Recommended maximum: 100 characters (200 if necessary).
    es: >
      Título bajo el cual se publicará el dataset.
      Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones.
      Máximo recomendado: 100 caracteres (200 si es necesario).
  help_inline: true
  required: true

  #DESCRIPTION
- field_name: dataset_description
  display_property: dct:description
  label: Dataset Description
  form_placeholder: eg. Describe los componentes de ahorro, inversión, etc
  form_snippet: markdown.html
  help_text:
    en: >
      Clear and concise description of the dataset’s content.
      Recommended maximum: 500 characters (1,500 if necessary).
    es: >
      Descripción clara y concisa del contenido del dataset.
      Máximo recomendado: 500 caracteres (1.500 si es necesario).
  help_inline: true
  required: true

#PUBLISHER NAME
- field_name: dataset_publisher_name
  display_property: dct:publisher
  label: Dataset Publisher Name
  preset: dataset_organization
  form_placeholder: eg. Jefatura de Gabinete de Ministros. Secretaría de Medios y Comunicación Pública.
  help_text:
    en: >
      Entity responsible for publishing the dataset.
      For organizations, use the hierarchical structure separated by dots.
    es: >
      Responsable de la publicación del dataset.
      Para organizaciones, usar estructura jerárquica separada por puntos.
  help_inline: true
  required: true

#PUBLISHER MAIL
- field_name: dataset_publisher_mbox
  label: Dataset Publisher Contact
  display_property: dct:publisher
  form_placeholder: correoisnt@gob.ar
  display_snippet: email.html
  help_text:
    en: >
      Contact email address of the entity responsible for publishing the dataset.
    es: >
      Correo electrónico de contacto del responsable de la publicación del dataset.
  help_inline: true
  required: false


#Acá habría que implementar un tesauro propio
#SUPERTHEME
- field_name: dataset_superTheme
  label: Dataset Supertheme
  display_property: dct:theme
  help_text:
    en: >
      Global theme(s) or category(ies) the dataset belongs to.
      Multiple values may be selected.
      Categories follow the EU Publications Office taxonomy.
    es: >
      Temática(s) o categoría(s) globales a las que pertenece el dataset.
      Se pueden seleccionar múltiples valores.
      Las categorías siguen la taxonomía de la Oficina de Publicaciones de la UE.
  help_inline: true
  required: true
  preset: select
  form_include_blank_choice: true
  sorted_choices: true
  choices:
    - value: http://publications.europa.eu/resource/authority/data-theme/TECH
      label:
        en: Technology (TECH)
        es: Tecnología (TECH)

    - value: http://publications.europa.eu/resource/authority/data-theme/ECON
      label:
        en: Economy and Finance (ECON)
        es: Economía y Finanzas (ECON)

    - value: http://publications.europa.eu/resource/authority/data-theme/EDUC
      label:
        en: Education, Culture and Sport (EDUC)
        es: Educación, Cultura y Deporte (EDUC)

    - value: http://publications.europa.eu/resource/authority/data-theme/SOCI
      label:
        en: Population and Society (SOCI)
        es: Población y Sociedad (SOCI)

    - value: http://publications.europa.eu/resource/authority/data-theme/ENER
      label:
        en: Energy (ENER)
        es: Energía (ENER)

    - value: http://publications.europa.eu/resource/authority/data-theme/GOVE
      label:
        en: Government and Public Sector (GOVE)
        es: Gobierno y Sector Público (GOVE)

    - value: http://publications.europa.eu/resource/authority/data-theme/JUST
      label:
        en: Justice, Legal System and Public Safety (JUST)
        es: Justicia, Sistema Legal y Seguridad Pública (JUST)

    - value: http://publications.europa.eu/resource/authority/data-theme/ENVI
      label:
        en: Environment (ENVI)
        es: Medio Ambiente (ENVI)

    - value: http://publications.europa.eu/resource/authority/data-theme/AGRI
      label:
        en: Agriculture, Fisheries, Forestry and Food (AGRI)
        es: Agricultura, Pesca, Silvicultura y Alimentación (AGRI)

    - value: http://publications.europa.eu/resource/authority/data-theme/HEAL
      label:
        en: Health (HEAL)
        es: Salud (HEAL)

    - value: http://publications.europa.eu/resource/authority/data-theme/TRAN
      label:
        en: Transport (TRAN)
        es: Transporte (TRAN)

    - value: http://publications.europa.eu/resource/authority/data-theme/REGI
      label:
        en: Regions and Cities (REGI)
        es: Regiones y Ciudades (REGI)




