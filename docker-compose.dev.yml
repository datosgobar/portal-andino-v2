volumes:
  ckan_storage:
  pg_data:
  solr_data:
  pip_cache:
  site_packages:
  local_bin:
  home_dir:

services:

  ckan-dev:
    build:
      context: ckan/
      dockerfile: Dockerfile.dev
      args:
        - TZ=${TZ}
    env_file:
      - .env
    links:
      - db
      - redis
    ports:
      - "0.0.0.0:${CKAN_PORT_HOST}:5000"
    volumes:
      - ckan_storage:/var/lib/ckan
      - ./src:/srv/app/src_extensions
      - pip_cache:/root/.cache/pip
      - site_packages:/usr/local/lib/python3.10/site-packages
      - local_bin:/usr/local/bin
      - home_dir:/srv/app/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5000"]
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      solr:
        condition: service_healthy

  db:
    build:
      context: postgresql/
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - CKAN_DB_USER
      - CKAN_DB_PASSWORD
      - CKAN_DB
      - DATASTORE_READONLY_USER
      - DATASTORE_READONLY_PASSWORD
      - DATASTORE_DB
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
     
  solr:
    build:
      context: ckan/solr/
      args:
        - SOLR_VERSION=${SOLR_IMAGE_VERSION}
    volumes:
      - solr_data:/var/solr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8983/solr/"]

  solr-init:
    image: curlimages/curl
    depends_on:
      - solr
    restart: "no"
    command: >
      sh -c '
      set -x;
      echo "running solr-init...";
      until curl -s http://solr:8983/solr/admin/cores?action=STATUS | grep -q "\"ckan\""; do sleep 2; done;
      echo "ckan core ready";

      curl -s -X POST -H "Content-type:application/json" http://solr:8983/solr/ckan/schema \
        --data-raw "{\"add-field-type\":{\"name\":\"location_rpt\",\"class\":\"solr.SpatialRecursivePrefixTreeFieldType\",\"spatialContextFactory\":\"JTS\",\"autoIndex\":true,\"validationRule\":\"repairBuffer0\",\"distErrPct\":0.025,\"maxDistErr\":0.001,\"distanceUnits\":\"kilometers\"}}" || true;

      curl -s -X POST -H "Content-type:application/json" http://solr:8983/solr/ckan/schema \
        --data-raw "{\"add-field\":{\"name\":\"spatial_geom\",\"type\":\"location_rpt\",\"indexed\":true,\"stored\":true,\"multiValued\":true}}" || true;

      curl -s http://solr:8983/solr/admin/cores?action=RELOAD&core=ckan || true;

      echo "done solr-init";
      '

  redis:
    image: redis:${REDIS_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-e", "QUIT"]
